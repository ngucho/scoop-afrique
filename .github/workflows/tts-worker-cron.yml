name: TTS worker cron

on:
  schedule:
    # Render Free can sleep; this keeps the Piper service warm enough for reader-triggered audio.
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  process-one:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger one Piper job
        env:
          TTS_WORKER_URL: ${{ secrets.TTS_WORKER_URL }}
          TTS_WORKER_SECRET: ${{ secrets.TTS_WORKER_SECRET }}
        run: |
          if [ -z "$TTS_WORKER_URL" ] || [ -z "$TTS_WORKER_SECRET" ]; then
            echo "TTS worker secrets are not configured yet; skipping."
            exit 0
          fi

          WORKER_URL="${TTS_WORKER_URL%/}"
          if [ "${WORKER_URL##*/}" != "process-one" ]; then
            WORKER_URL="$WORKER_URL/process-one"
          fi

          curl --fail --silent --show-error --max-time 240 -X POST "$WORKER_URL" \
            -H "Authorization: Bearer $TTS_WORKER_SECRET"
