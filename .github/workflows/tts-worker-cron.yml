name: Ping Render TTS worker

on:
  workflow_dispatch:

jobs:
  process-one:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger Piper batch
        env:
          TTS_WORKER_URL: ${{ secrets.TTS_WORKER_URL }}
          TTS_WORKER_SECRET: ${{ secrets.TTS_WORKER_SECRET }}
        run: |
          if [ -z "$TTS_WORKER_URL" ] || [ -z "$TTS_WORKER_SECRET" ]; then
            echo "TTS worker secrets are not configured yet; skipping."
            exit 0
          fi

          WORKER_URL="${TTS_WORKER_URL%/}"
          if [ "${WORKER_URL##*/}" = "process-one" ]; then
            WORKER_URL="${WORKER_URL%/process-one}/process-batch"
          elif [ "${WORKER_URL##*/}" != "process-batch" ]; then
            WORKER_URL="$WORKER_URL/process-batch"
          fi

          curl --fail --silent --show-error --max-time 840 -X POST "$WORKER_URL" \
            -H "Authorization: Bearer $TTS_WORKER_SECRET"
